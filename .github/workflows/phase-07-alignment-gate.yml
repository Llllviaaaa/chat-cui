name: phase-07-alignment-gate

on:
  pull_request:
    paths:
      - "pc-agent-plugin/**"
      - "gateway/**"
      - ".planning/phases/07-pc-agent-message-bridge-opencode-plugin/**"
      - ".github/workflows/phase-07-alignment-gate.yml"
  push:
    branches:
      - master
      - main
    paths:
      - "pc-agent-plugin/**"
      - "gateway/**"
      - ".planning/phases/07-pc-agent-message-bridge-opencode-plugin/**"
      - ".github/workflows/phase-07-alignment-gate.yml"

jobs:
  verify-phase-07:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: pc-agent-plugin/package-lock.json

      - name: Install plugin dependencies
        run: npm.cmd --prefix pc-agent-plugin ci

      - name: Run phase-07 hard gate
        run: npm.cmd --prefix pc-agent-plugin run verify:phase-07
