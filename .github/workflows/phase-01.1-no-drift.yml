name: phase-01.1-no-drift

on:
  pull_request:
    paths:
      - "pc-agent-plugin/**"
      - ".github/workflows/phase-01.1-no-drift.yml"
  push:
    branches: [main]
    paths:
      - "pc-agent-plugin/**"
      - ".github/workflows/phase-01.1-no-drift.yml"

jobs:
  no-drift:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: pc-agent-plugin/package-lock.json

      - name: Install dependencies
        run: npm --prefix pc-agent-plugin ci

      - name: Verify no-drift architecture gates
        run: npm --prefix pc-agent-plugin run verify:no-drift
